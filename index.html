<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <title>Document</title>
   <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="postcard">
        <div class="postcard_header">
            <h1>My Postcard</h1>
            <img src="https://raw.githubusercontent.com/breatheco-de/exercise-postcard/e63a7916530cc850bd92aa1c2e19191837fb5c80/.learn/assets/4geeks.png" />
        </div>
        <div class="postcard_body">
            <div class="left">
                <p>Hello friend, I hope you are having a wonderful day and smiling a lot.</p>
                <p>I wanted to send you this postcard to say thank you for always being there.</p>
            </div>
            <div class="right">
                <input type="text" placeholder="Sweetie">
                <input type="text" placeholder="Sweetie@example.cok">
                <input type="text" placeholder="I saw how hard you practiced!">
            </div>
        </div>
        <div class="postcard_footer">
            <button>Send My Postcard</button>
        </div>
    </div>
</body>
</html>
